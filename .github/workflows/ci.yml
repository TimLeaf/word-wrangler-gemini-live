name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - name: Detect client changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            client:
              - 'client/**'
              - '.github/workflows/ci.yml'

      - name: Setup Node.js
        if: steps.changes.outputs.client == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.client == 'true'
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.client == 'true'
        run: npm run lint

      - name: Test
        if: steps.changes.outputs.client == 'true'
        run: npm test

      - name: Build
        if: steps.changes.outputs.client == 'true'
        run: npm run build

  server:
    name: Server (Pipecat / Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6

      - name: Detect server changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/ci.yml'

      - name: Setup Python
        if: steps.changes.outputs.server == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Setup uv
        if: steps.changes.outputs.server == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock

      - name: Install dependencies
        if: steps.changes.outputs.server == 'true'
        run: uv sync --locked

      - name: Lint
        if: steps.changes.outputs.server == 'true'
        run: uv run ruff check .

      - name: Type check
        if: steps.changes.outputs.server == 'true'
        run: uv run ty check

      - name: Test
        if: steps.changes.outputs.server == 'true'
        run: uv run pytest

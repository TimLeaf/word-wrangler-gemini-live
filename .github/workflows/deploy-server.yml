name: Deploy Server to Pipecat Cloud

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    env:
      PIPECAT_TOKEN: ${{ secrets.PCC_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Capture pre-deploy active deployment ID
        id: pre
        run: |
          set -euo pipefail
          output=$(uv run pc cloud agent status word-wrangler 2>&1 || true)
          echo "$output"
          prev_id=$(echo "$output" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1 || true)
          echo "prev_id=$prev_id" >> "$GITHUB_OUTPUT"
          echo "Previous active deployment ID: ${prev_id:-<none>}"

      - name: Deploy to Pipecat Cloud
        run: uv run pc cloud deploy --yes

      - name: Verify deploy rolled out
        env:
          PREV_ID: ${{ steps.pre.outputs.prev_id }}
        run: |
          set -euo pipefail
          sleep 10
          output=$(uv run pc cloud agent status word-wrangler 2>&1)
          echo "$output"
          new_id=$(echo "$output" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1 || true)
          echo "New active deployment ID: ${new_id:-<none>}"
          if [ -z "$new_id" ]; then
            echo "::error::Could not parse Active Deployment ID from pcc agent status output"
            exit 1
          fi
          if [ -n "$PREV_ID" ] && [ "$new_id" = "$PREV_ID" ]; then
            echo "::error::Active Deployment ID did not change after deploy (still $new_id) — rollout may have failed"
            exit 1
          fi
          if ! echo "$output" | grep -q "Ready"; then
            echo "::error::Agent word-wrangler is not in Ready state after deploy"
            exit 1
          fi
          echo "Deploy verified: new deployment $new_id is Ready"
